name: Flatpak Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache flatpak runtimes
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtime-freedesktop-24.08

      - name: Cache flatpak-builder state
        uses: actions/cache@v4
        with:
          path: .flatpak-builder
          key: flatpak-builder-${{ hashFiles('io.github.foofly.ColditzEscape.yml') }}
          restore-keys: flatpak-builder-

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean build-dir io.github.foofly.ColditzEscape.yml
          flatpak build-export repo build-dir
          flatpak build-bundle repo ColditzEscape.flatpak io.github.foofly.ColditzEscape

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColditzEscape.flatpak
          path: ColditzEscape.flatpak

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "Colditz Escape $TAG" \
            --notes "Install: \`flatpak install --user ColditzEscape.flatpak\`" \
            ColditzEscape.flatpak
